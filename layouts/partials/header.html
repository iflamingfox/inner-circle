<header class="site-header">
  <a href="{{ "/" | relURL }}" class="brand-lockup" aria-label="{{ .Site.Title }} — home">
    {{ with resources.Get "images/logo.png" }}
      <img class="brand-lockup__logo" src="{{ .RelPermalink }}" alt="{{ $.Site.Title }}" width="600" height="101">
    {{ end }}
    <span class="brand-lockup__tagline">Contemporary space for ancient traditions</span>
  </a>
  <button class="nav__toggle" aria-expanded="false" aria-controls="primary-nav" data-nav-toggle>Menu</button>
  <nav id="primary-nav" class="nav" aria-label="Primary">
    {{ range .Site.Menus.main }}
      <a href="{{ .PageRef | relURL }}">{{ .Name }}</a>
    {{ end }}
    <a href="{{ .Site.Params.boxOffice }}" class="btn btn--primary" target="_blank" rel="noopener">Tickets</a>
  </nav>
</header>
<script>
  (function () {
    var btn = document.querySelector('[data-nav-toggle]');
    var nav = document.getElementById('primary-nav');
    if (!btn || !nav) return;
    btn.addEventListener('click', function () {
      var open = nav.classList.toggle('is-open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
  })();
</script>
