<header class="site-header">
  <a href="{{ "/" | relURL }}" class="brand-lockup" aria-label="{{ .Site.Title }} — home">
    {{ with resources.Get "images/logo.png" }}
      <img class="brand-lockup__logo" src="{{ .RelPermalink }}" alt="{{ $.Site.Title }}" width="600" height="101">
    {{ end }}
    <span class="brand-lockup__tagline">Contemporary space for ancient traditions</span>
  </a>
  <button class="nav__toggle" aria-expanded="false" aria-controls="primary-nav" data-nav-toggle>Menu</button>
  <nav id="primary-nav" class="nav" aria-label="Primary">
    {{ range .Site.Menus.main }}
      <a href="{{ .PageRef | relURL }}">{{ .Name }}</a>
    {{ end }}
    <a href="{{ "/concerts/" | relURL }}" class="btn btn--primary">Events</a>
  </nav>
</header>
<script>
  (function () {
    function init() {
    var btn = document.querySelector('[data-nav-toggle]');
    var nav = document.getElementById('primary-nav');
    if (btn && nav) {
      btn.addEventListener('click', function () {
        var open = nav.classList.toggle('is-open');
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
      });
    }
    // Home: keep header transparent over the hero, turn solid once scrolled past it.
    var header = document.querySelector('.site-header');
    var hero = document.querySelector('.vhero');
    if (header && hero) {
      var onScroll = function () {
        var threshold = hero.offsetHeight - 90;
        header.classList.toggle('is-scrolled', window.scrollY > threshold);
      };
      onScroll();
      window.addEventListener('scroll', onScroll, { passive: true });
      window.addEventListener('resize', onScroll, { passive: true });
    }
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
