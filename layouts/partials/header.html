<header class="site-header">
  <a href="{{ "/" | relURL }}" class="brand">{{ .Site.Title }}</a>
  <nav class="nav" aria-label="Primary">
    {{ range .Site.Menus.main }}
      <a href="{{ .PageRef | relURL }}">{{ .Name }}</a>
    {{ end }}
    <a href="{{ .Site.Params.boxOffice }}" class="btn btn--primary" target="_blank" rel="noopener">Tickets</a>
  </nav>
</header>
